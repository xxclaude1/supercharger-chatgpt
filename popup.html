<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fff;
      color: #1a1a1a;
      padding: 20px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .header-icon {
      font-size: 24px;
    }
    .header h1 {
      font-size: 15px;
      font-weight: 600;
      line-height: 1.2;
    }
    .header span {
      font-size: 11px;
      color: #666;
      font-weight: 400;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      border-top: 1px solid #eee;
      border-bottom: 1px solid #eee;
    }
    .toggle-label {
      font-size: 13px;
      font-weight: 500;
    }
    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
    }
    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #ccc;
      border-radius: 24px;
      transition: 0.2s;
    }
    .toggle-slider:before {
      content: "";
      position: absolute;
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background: white;
      border-radius: 50%;
      transition: 0.2s;
    }
    .toggle input:checked + .toggle-slider {
      background: #10a37f;
    }
    .toggle input:checked + .toggle-slider:before {
      transform: translateX(20px);
    }
    .slider-section {
      padding: 16px 0;
    }
    .slider-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .slider-header label {
      font-size: 12px;
      color: #666;
    }
    .slider-header .value {
      font-size: 13px;
      font-weight: 600;
      color: #10a37f;
    }
    input[type="range"] {
      width: 100%;
      height: 4px;
      -webkit-appearance: none;
      appearance: none;
      background: #e0e0e0;
      border-radius: 2px;
      outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #10a37f;
      cursor: pointer;
    }
    .stats {
      background: #f7f7f8;
      border-radius: 8px;
      padding: 12px;
      margin-top: 4px;
    }
    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: #666;
    }
    .stat-row + .stat-row {
      margin-top: 6px;
    }
    .stat-value {
      font-weight: 600;
      color: #1a1a1a;
    }
    .stat-value.active {
      color: #10a37f;
    }
    .footer {
      margin-top: 16px;
      text-align: center;
      font-size: 10px;
      color: #aaa;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-icon">&#9889;</div>
    <div>
      <h1>Supercharger</h1>
      <span>for ChatGPT</span>
    </div>
  </div>

  <div class="toggle-row">
    <span class="toggle-label">Speed Boost</span>
    <label class="toggle">
      <input type="checkbox" id="enabled" checked>
      <span class="toggle-slider"></span>
    </label>
  </div>

  <div class="slider-section">
    <div class="slider-header">
      <label>Visible Messages</label>
      <span class="value" id="slider-value">50</span>
    </div>
    <input type="range" id="visible-count" min="2" max="200" step="1" value="50">
  </div>

  <div id="status-msg" style="text-align:center;font-size:11px;color:#10a37f;padding:4px 0 8px;display:none;"></div>

  <div class="stats">
    <div class="stat-row">
      <span>Messages Optimized</span>
      <span class="stat-value active" id="optimized-count">0</span>
    </div>
    <div class="stat-row">
      <span>Total Messages</span>
      <span class="stat-value" id="total-count">0</span>
    </div>
  </div>

  <div class="footer">
    100% Free &middot; Open Source &middot; No Data Collection
  </div>

  <script src="popup.js"></script>
</body>
</html>
