<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      overflow: hidden;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 18px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .header .logo {
      font-size: 22px;
      line-height: 1;
    }

    .header .title {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .header .version {
      font-size: 10px;
      color: #64748b;
      margin-left: auto;
      background: rgba(100,116,139,0.15);
      padding: 2px 8px;
      border-radius: 10px;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 14px 18px;
    }

    .stat-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px;
      padding: 12px;
      text-align: center;
    }

    .stat-card .value {
      font-size: 22px;
      font-weight: 700;
      color: #7dd3fc;
      line-height: 1.2;
    }

    .stat-card .value.green { color: #6ee7b7; }

    .stat-card .label {
      font-size: 10px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-top: 4px;
    }

    .controls {
      padding: 8px 18px 14px;
    }

    .control-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
    }

    .control-row + .control-row {
      border-top: 1px solid rgba(255,255,255,0.04);
    }

    .control-label {
      font-size: 13px;
      color: #cbd5e1;
    }

    .control-sublabel {
      font-size: 10px;
      color: #475569;
      margin-top: 2px;
    }

    /* Toggle Switch */
    .toggle {
      position: relative;
      width: 42px;
      height: 24px;
      cursor: pointer;
    }

    .toggle input { display: none; }

    .toggle .slider {
      position: absolute;
      inset: 0;
      background: #1e293b;
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.08);
      transition: all 0.2s;
    }

    .toggle .slider::after {
      content: '';
      position: absolute;
      top: 3px;
      left: 3px;
      width: 16px;
      height: 16px;
      background: #475569;
      border-radius: 50%;
      transition: all 0.2s;
    }

    .toggle input:checked + .slider {
      background: rgba(16, 185, 129, 0.2);
      border-color: rgba(16, 185, 129, 0.4);
    }

    .toggle input:checked + .slider::after {
      transform: translateX(18px);
      background: #10b981;
    }

    /* Slider */
    .range-control {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .range-control input[type="range"] {
      width: 100px;
      height: 4px;
      -webkit-appearance: none;
      appearance: none;
      background: #1e293b;
      border-radius: 2px;
      outline: none;
    }

    .range-control input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      background: #7dd3fc;
      border-radius: 50%;
      cursor: pointer;
    }

    .range-value {
      font-size: 13px;
      font-weight: 600;
      color: #7dd3fc;
      min-width: 28px;
      text-align: right;
    }

    .footer {
      padding: 10px 18px 14px;
      border-top: 1px solid rgba(255,255,255,0.04);
      text-align: center;
    }

    .footer a {
      font-size: 10px;
      color: #475569;
      text-decoration: none;
    }

    .footer a:hover { color: #7dd3fc; }

    .status-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      margin-right: 6px;
    }

    .status-dot.on { background: #10b981; box-shadow: 0 0 6px rgba(16,185,129,0.5); }
    .status-dot.off { background: #ef4444; }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo">⚡</span>
    <span class="title">ChatGPT Turbo</span>
    <span class="version">v1.0.0</span>
  </div>

  <div class="stats">
    <div class="stat-card">
      <div class="value" id="totalMessages">–</div>
      <div class="label">Total Messages</div>
    </div>
    <div class="stat-card">
      <div class="value green" id="hiddenMessages">–</div>
      <div class="label">Trimmed</div>
    </div>
  </div>

  <div class="controls">
    <div class="control-row">
      <div>
        <div class="control-label"><span class="status-dot" id="statusDot"></span>Turbo Mode</div>
        <div class="control-sublabel">Trim old messages to reduce lag</div>
      </div>
      <label class="toggle">
        <input type="checkbox" id="enableToggle" checked />
        <span class="slider"></span>
      </label>
    </div>
    <div class="control-row">
      <div>
        <div class="control-label">Visible Messages</div>
        <div class="control-sublabel">Keep this many messages rendered</div>
      </div>
      <div class="range-control">
        <input type="range" id="visibleSlider" min="2" max="100" step="1" value="5" />
        <span class="range-value" id="visibleValue">5</span>
      </div>
    </div>
  </div>

  <div class="footer">
    <a href="https://github.com/xxclaude1/supercharger-chatgpt" target="_blank">
      Free & open source ❤️
    </a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
